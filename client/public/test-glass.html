<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 100vw; height: 100vh; overflow: hidden; }

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}
.bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card {
  position: relative;
  z-index: 1;
  margin: 15vh auto;
  width: 300px;
  padding: 2rem;
  border-radius: 24px;
  overflow: hidden;
  color: white;
  font-family: system-ui;

  /* The exact glassmorphism effect */
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  backdrop-filter: blur(40px) saturate(180%);
  background: linear-gradient(
    165deg,
    rgba(255, 240, 200, 0.30) 0%,
    rgba(245, 230, 190, 0.22) 50%,
    rgba(235, 220, 185, 0.15) 100%
  );
  box-shadow:
    inset 0 0 0 0.5px rgba(255, 255, 255, 0.3),
    inset 0 1px 0 0 rgba(255, 255, 255, 0.4),
    0 12px 40px rgba(0, 0, 0, 0.2);
}
</style>
</head>
<body>
  <div class="bg"><img src="/bg.png" alt=""></div>
  <div class="card">
    <h2>Test Glass Card</h2>
    <p>Does backdrop-filter blur work?</p>
  </div>
</body>
</html>
